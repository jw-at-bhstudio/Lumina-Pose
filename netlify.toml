[build]
  command = "npm ci && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/presets"
  to = "/.netlify/functions/presets"
  status = 200
  force = true

[[redirects]]
  from = "/api/presets/*"
  to = "/.netlify/functions/presets/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
